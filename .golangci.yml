version: "2"
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Printf
        - (io.Closer).Close
        - (*os.Process).Signal
        - (*os.Process).Kill
        - io.Copy
  exclusions:
    paths:
      - ".*_test\\.go"
formatters:
  enable:
    - gofmt
    - goimports
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
